<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Equilibrity - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="pagina">

        <!-- HEADER -->
        <header class="topo">
            <div class="logo">
                <!-- Insira sua logo aqui -->
                <img src="logo.png" alt="Equilibrity">
            </div>

            <nav class="menu">
                <a href="#">Para Ela</a>
                <a href="#">Para Ele</a>
                <a href="index.html">Inicial</a>
                <a href="#">Blog</a>
                <a href="cadastro.html">Minha Conta</a>
            </nav>
        </header>

        <!-- BANNER -->
        <section class="banner">
            <div class="banner-conteudo">

                <div class="banner-texto">
                    <h2>Cuidado Essencial <br> & <br> Inovação</h2>
                    <button>COMECE SEU TESTE EM DESTAQUE</button>
                </div>

                <div class="banner-logo">
                    <h1>Equilibrity</h1>
                    <p>Seu bem-estar, nosso cuidado</p>
                </div>

            </div>
        </section>

        <!-- LOGIN -->
        <section class="area-form">

            <h2 class="titulo-login">Login</h2>

            <form class="formulario" id="formLogin">

                <input type="text" placeholder="Usuário..." required>

                <input type="password" placeholder="Senha..." required>

                <button type="submit" class="btn-criar">Entrar</button>

            </form>

        </section>

        <!-- RODAPÉ -->
        <section class="rodape-login"></section>

    </div>

    <!-- SCRIPT -->
    <script>
        document.getElementById("formLogin").addEventListener("submit", function(e) {
            e.preventDefault();

            alert("Login realizado com sucesso!");

            // redirecionamento opcional
            window.location.href = "index.html";
        });
    </script>

</body>
</html>

<footer class="footer">
    <p>© 2026 Equilibrity - Todos os direitos reservados</p>
</footer>
</body>

</html>
