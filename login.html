<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Equilibrity</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="app">

    <!-- HEADER PADRÃO RITUAL -->
    <header class="header-ritual">

        <div class="left-text">
            <p>Cuidado Essencial &</p>
            <p>Inovação</p>

            <button class="btn-destaque">
                COMECE SEU TESTE EM DESTAQUE
            </button>
        </div>

        <div class="logo-area">
            <img src="imagens/logo01.png" alt="Logo">
            <h1>Equilibrity</h1>
            <p>Seu bem-estar, nosso cuidado</p>
        </div>

    </header>

    <!-- CONTEÚDO -->
    <main class="container-login">

        <h2>Login</h2>

        <form class="formulario">

            <label>Email:</label>
            <input type="email">

            <label>Senha:</label>
            <input type="password">

            <button type="submit" class="btn-login">
                Entrar
            </button>
            <a href="minhaconta.html">Não tem conta? Criar</a>

        </form>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 Equilibrity - Todos os direitos reservados</p>
    </footer>

</div>

</body>
</html>
