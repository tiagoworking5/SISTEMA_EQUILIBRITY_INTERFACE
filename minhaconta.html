<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Equilibrity</title>
    <link rel="stylesheet" href="minhaconta.css">
</head>

<body>

<div class="app">

    <!-- HEADER IGUAL AO RITUAL -->
    <header class="header-ritual">

        <div class="left-text">
            <p>Cuidado Essencial &</p>
            <p>Inovação</p>

            <button class="btn-destaque">
                COMECE SEU TESTE EM DESTAQUE
            </button>
        </div>

        <div class="logo-area">
            <img src="imagens/logo01.png" alt="Equilibrity Logo">
            <h1>Equilibrity</h1>
            <p>Seu bem-estar, nosso cuidado</p>
        </div>

    </header>

    <!-- CONTEÚDO -->
    <main class="container-conta">

        <h2>Minha Conta</h2>

        <form class="formulario">

            <label>Nome:</label>
            <input type="text">

            <label>CEP:</label>
            <input type="text">

            <label>Email:</label>
            <input type="email">

            <label>Senha:</label>
            <input type="password">

            <label>Confirme a senha:</label>
            <input type="password">

            <button type="submit" class="btn-criar">
                Criar Conta
            </button>

        </form>

    </main>

    <!-- FOOTER PADRÃO -->
    <footer class="footer">
        <p>© 2026 Equilibrity - Todos os direitos reservados</p>
    </footer>

</div>

</body>
</html>
